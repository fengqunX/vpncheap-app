name: 问题反馈（中文）
description: 反馈一个可以重现的 VPNCheap 应用问题。
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **请认真填写每一个必填项。**

        最重要的事情：请附上一张**截图**或一段**短视频录屏**来展示问题。仅文字描述的反馈非常难以处理。

  - type: dropdown
    id: platform
    attributes:
      label: 平台
      description: 你在哪个平台上遇到这个问题？**请手动选择，不要保留默认占位符。**
      options:
        - "⚠️ 请选择平台（保留此项会被视为无效提交并关闭）"
        - iOS
        - macOS
        - Android
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 系统版本
      description: 你的操作系统版本。
      placeholder: "例如：iOS 17.4 / macOS 14.4 / Windows 11 23H2 / Android 14 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号
      description: 设备型号（可选，但有助于排查）。
      placeholder: "例如：iPhone 15 Pro / Pixel 8 / MacBook Pro M2 / ThinkPad X1"
    validations:
      required: false

  - type: input
    id: app_version
    attributes:
      label: 应用版本
      description: 可在「设置 → 关于」或登录页底部查看。
      placeholder: "例如：1.4.2 (build 142)"
    validations:
      required: true

  - type: dropdown
    id: install_source
    attributes:
      label: 安装来源
      description: |
        你是从哪里安装这个应用的？

        **iOS 用户必读：** 我们在 iOS 上同时发布了两个版本 —— **原生版（Native）** 和 **Flutter 版**。两者都可以通过 TestFlight 安装，但 App Store 上架的只有原生版。**请准确选择**，否则我们很难定位你的问题。

        如何区分（仅 TestFlight 需要区分）：
        - 打开 **TestFlight** 应用 → 点击你的 VPNCheap → 滚到底部查看「Bundle ID」。
        - Bundle ID 是 `com.vpncheap.iosnative` → 选 **原生版 Native**。
        - Bundle ID 是 `com.novamindllc.vpncheap` → 选 **Flutter 版**。
        - App Store 下载的一律是 **原生版 Native**。
      options:
        - "⚠️ 请选择安装来源（保留此项会被视为无效提交并关闭）"
        - iOS — App Store（原生版 Native）
        - iOS — TestFlight（原生版 Native · com.vpncheap.iosnative）
        - iOS — TestFlight（Flutter 版 · com.novamindllc.vpncheap）
        - Android — GitHub Release .apk
        - macOS — GitHub Release .dmg
        - Windows — GitHub Release .exe
        - Linux — GitHub Release .AppImage / .deb
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 具体遇到了什么问题？你看到了什么？
      placeholder: "点击连接按钮后，VPN 无法连接……"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 重现步骤（必填）
      description: |
        **必填 — 请按你实际操作的顺序，每一步一行，从打开应用开始依次列出。** 不要只写"登录失败"这种概述，要写出每一次点击和每一个页面。如果我们无法按你的步骤重现问题，就无法修复。
      placeholder: |
        1. 打开应用
        2. 在首页点击"登录"
        3. 输入邮箱和密码，点击"提交"
        4. 在服务器列表中选择 "Tokyo 01"
        5. 点击连接按钮
        6. 等待约 30 秒
        7. 出现上面描述的错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为 vs 实际行为
      description: 你期望发生什么？实际发生了什么？
      placeholder: |
        预期：VPN 连接成功，状态显示为"已连接"。
        实际：应用显示"连接中"持续 30 秒，然后回到"未连接"状态。
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏（必填）
      description: |
        **这是最重要的一项。** 请拖拽一张图片或一段短视频到下方框中来展示问题。
        各平台录屏方式：iOS 控制中心 → 屏幕录制；Android 下拉快捷栏 → 屏幕录制；macOS 快捷键 ⇧⌘5；Windows 快捷键 Win+G；Linux 使用系统自带截图工具。
      placeholder: "请把截图或录屏文件拖到这里。"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志（可选）
      description: |
        如果你知道如何获取日志，可以在这里粘贴错误信息。如果不清楚如何收集日志，留空即可，上方的截图或录屏已经足够。
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: integrity
    attributes:
      label: 完整性声明
      description: 请勾选下面每一项。
      options:
        - label: "我已搜索并确认此问题不是重复提交。"
          required: true
        - label: "我正在使用最新发布的版本。"
          required: true
        - label: "我已附上至少一张截图或一段录屏来展示这个问题。"
          required: true
        - label: "我按顺序逐条写出了重现步骤，而不是只写一句概述。"
          required: true
        - label: "我的重现步骤不依赖只有我才有的私密账号凭据。"
          required: true
