name: 咨询（中文）
description: 询问 VPNCheap 发布、下载、安装或更新流程如何工作，以及为什么某些做法不可行。
title: "[Inquiry] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        **这个表单用于咨询和澄清，不用于提交 bug 或新功能。**

        例如：可以询问「为什么某个崩溃场景不能让用户手动发送日志？」或「为什么某个平台的安装包这样发布？」这类工作原理问题。请先说明发布渠道、场景和你已经看过的信息。没有上下文的重复问题可能会被关闭或转到已有 issue。

  - type: dropdown
    id: release_area
    attributes:
      label: 发布渠道 / 安装包
      description: 这个问题主要和哪个发布渠道有关？**请手动选择，不要保留默认占位符。**
      options:
        - "⚠️ 请选择发布渠道（保留此项会被视为无效提交并关闭）"
        - iOS — App Store（原生版 Native）
        - iOS — TestFlight（原生版 Native）
        - iOS — TestFlight（Flutter 版）
        - Android — GitHub Release .apk
        - macOS — GitHub Release .dmg
        - Windows — GitHub Release .exe
        - Linux — GitHub Release .AppImage / .deb
        - Release 页面 / 下载说明
        - 不限定发布渠道
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: 咨询主题
      description: 你想了解哪一类问题？**请手动选择，不要保留默认占位符。**
      options:
        - "⚠️ 请选择咨询主题（保留此项会被视为无效提交并关闭）"
        - 日志 / 崩溃 / 诊断
        - 下载 / 安装 / 更新流程
        - 版本说明 / changelog
        - App Store / TestFlight 发布
        - GitHub Release 资产
        - 系统兼容性 / 平台支持
        - 其他
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: 你想弄清楚什么？
      description: 请直接写出你的问题。不要只写一句「为什么不加这个」。
      placeholder: |
        例如：为什么应用崩溃后不能让用户点击按钮上传本地日志？
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 背景和你已经确认的信息
      description: 说明你在哪个页面、什么操作后产生疑问，以及你已经看过哪些说明或 issue。
      placeholder: |
        例如：我看到 Release 说明里提到崩溃诊断，但不确定为什么不能在应用闪退后再让用户上传日志。
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 截图、链接或补充信息（可选）
      description: 如果问题和 Release 页面、下载链接、安装提示、更新流程或已有 issue 有关，请贴上链接或截图。
      placeholder: "可以放截图、录屏、下载链接、版本号、相关 issue 或文档链接。"
    validations:
      required: false

  - type: checkboxes
    id: integrity
    attributes:
      label: 提交确认
      description: 请勾选每一项。
      options:
        - label: "我已搜索现有 issues，确认没有相同问题的解释。"
          required: true
        - label: "我理解如果应用进程已经崩溃，应用本身无法继续执行上传日志的代码。"
          required: true
        - label: "我已说明发布渠道、咨询主题、具体问题和背景。"
          required: true
        - label: "我确认这不是 bug 反馈或功能请求；如果是，我会使用对应表单。"
          required: true
